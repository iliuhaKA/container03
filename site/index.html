<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Пример сайта</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f5f5f5;
        }
        header {
            background-color: #333;
            color: white;
            padding: 20px;
            text-align: center;
            border-radius: 5px;
        }
        nav {
            margin: 20px 0;
        }
        nav a {
            margin-right: 15px;
            text-decoration: none;
            color: #333;
        }
        nav a:hover {
            color: #0066cc;
        }
        main {
            background-color: white;
            padding: 20px;
            border-radius: 5px;
            margin: 20px 0;
        }
        footer {
            background-color: #333;
            color: white;
            text-align: center;
            padding: 20px;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <header>
        <h1>Добро пожаловать на мой сайт</h1>
    </header>

    <nav>
        <a href="#home">Главная</a>
        <a href="#about">О сайте</a>
        <a href="#contacts">Контакты</a>
    </nav>

    <main>
        <h2>Основная информация</h2>
        <p>Это простой пример разметки HTML сайта.</p>
        <p>Здесь можно разместить любую информацию.</p>
    </main>

    <footer>
        <p>&copy; 2026 Мой сайт. Все права защищены.</p>
    </footer>
</body>
</html>
